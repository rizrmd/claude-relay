<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Relay WebSocket Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1400px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            font-size: 0.9em;
            margin-top: 10px;
        }

        .status.connected {
            background: rgba(52, 211, 153, 0.3);
        }

        .status.disconnected {
            background: rgba(239, 68, 68, 0.3);
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7f7f7;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
        }

        .message-content-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .message-text {
            flex: 1;
        }

        .message-undo-btn {
            opacity: 0;
            transition: opacity 0.2s;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            padding: 0;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .message.sent:hover .message-undo-btn {
            opacity: 1;
        }

        .message-undo-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .message.sent {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .message.received {
            background: white;
            color: #333;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .message.error {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
        }

        .message.thinking {
            background: #e3f2fd;
            color: #1976d2;
            font-style: italic;
            animation: pulse 1.5s ease-in-out infinite alternate;
            border: 1px solid #bbdefb;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(0); }
            100% { opacity: 0; transform: translateX(-20px); }
        }

        .message.system {
            background: #e0f2fe;
            color: #0369a1;
            text-align: center;
            margin: 0 auto;
            font-size: 12px;
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        #messageInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            font-family: 'Monaco', 'Menlo', monospace;
        }

        #messageInput:focus {
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .controls {
            padding: 20px;
            background: #f0f0f0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .controls button {
            padding: 10px 20px;
            font-size: 14px;
        }

        #connectBtn {
            background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
        }

        #disconnectBtn {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        #clearBtn {
            background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
        }

        #restoreBtn {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .timestamp {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
        }

        @media (max-width: 600px) {
            .container {
                border-radius: 0;
                height: 100vh;
                max-width: 100%;
            }

            .chat-container {
                height: calc(100vh - 200px);
            }

            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Claude Relay</h1>
            <div id="status" class="status disconnected">Disconnected</div>
        </div>

        <div class="controls">
            <button id="connectBtn" onclick="connect()">Connect</button>
            <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
            <button id="clearBtn" onclick="clearMessages()">Clear</button>
            <button id="restoreBtn" onclick="restoreLastUndo()" style="display: none;">↻ Restore</button>
        </div>

        <div class="chat-container">
            <div id="messages" class="messages"></div>
            
            <div class="input-container">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="Type your message and press Enter..." 
                        onkeypress="handleKeyPress(event)"
                        disabled
                    />
                    <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let isConnected = false;
        let messageHistory = []; // Track all messages in order
        let canRestore = false; // Track if we can restore undone messages

        function connect() {
            if (ws) {
                ws.close();
            }

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//localhost:8081/ws`;
            
            addSystemMessage('Connecting to WebSocket server...');
            
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                isConnected = true;
                updateStatus('Connected', true);
                addSystemMessage('Connected to Claude relay server');
                document.getElementById('messageInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('connectBtn').disabled = true;
                document.getElementById('disconnectBtn').disabled = false;
                document.getElementById('messageInput').focus();
            };

            ws.onmessage = function(event) {
                const messageText = event.data;
                
                // Check if this is an undo result
                if (messageText.startsWith('UNDO_SUCCESS:')) {
                    const indexStr = messageText.split(':')[1];
                    if (indexStr !== 'last') {
                        const index = parseInt(indexStr);
                        // Remove messages from history
                        messageHistory = messageHistory.slice(0, index);
                    }
                    // Show restore button since we can now restore
                    showRestoreButton();
                    return;
                }
                
                // Check if this is a restore result
                if (messageText.startsWith('RESTORE_SUCCESS:')) {
                    const jsonStr = messageText.substring('RESTORE_SUCCESS:'.length);
                    try {
                        const restoredMessages = JSON.parse(jsonStr);
                        // Re-add the restored messages to the UI
                        restoredMessages.forEach(msgPair => {
                            // Add user message
                            const userMsgId = addMessage(msgPair.user, 'sent');
                            messageHistory.push({
                                id: userMsgId,
                                type: 'sent',
                                text: msgPair.user,
                                timestamp: Date.now()
                            });
                            
                            // Add Claude's response
                            const claudeMsgId = addMessage(msgPair.claude, 'received');
                            messageHistory.push({
                                id: claudeMsgId,
                                type: 'received',
                                text: msgPair.claude,
                                timestamp: Date.now()
                            });
                        });
                        
                        addSystemMessage(`↻ Restored ${restoredMessages.length} conversation exchange(s)`);
                        hideRestoreButton();
                    } catch (e) {
                        console.error('Failed to parse restore response:', e);
                    }
                    return;
                }
                
                // Check if this is a progress indicator
                if (messageText.includes('🤔') && messageText.includes('thinking')) {
                    addMessage(messageText, 'thinking');
                } else if (messageText.includes('💭') || messageText.includes('🔍') || 
                          messageText.includes('📖') || messageText.includes('🧠')) {
                    updateThinkingIndicator(messageText);
                } else if (messageText.includes('❌') && messageText.includes('Error:')) {
                    removeThinkingIndicator();
                    addMessage(messageText, 'error');
                } else {
                    // Remove any previous thinking indicator and show response
                    removeThinkingIndicator();
                    const messageId = addMessage(messageText, 'received');
                    
                    // Track Claude's response in history
                    messageHistory.push({
                        id: messageId,
                        type: 'received',
                        text: messageText,
                        timestamp: Date.now()
                    });
                }
            };

            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
                addSystemMessage('Connection error occurred', true);
            };

            ws.onclose = function() {
                isConnected = false;
                updateStatus('Disconnected', false);
                addSystemMessage('Disconnected from server');
                document.getElementById('messageInput').disabled = true;
                document.getElementById('sendBtn').disabled = true;
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('disconnectBtn').disabled = true;
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (message && ws && isConnected) {
                ws.send(message);
                const messageId = addMessage(message, 'sent');
                
                // Track this message in history
                messageHistory.push({
                    id: messageId,
                    type: 'sent',
                    text: message,
                    timestamp: Date.now()
                });
                
                input.value = '';
                input.focus();
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function addMessage(text, type) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            // Generate unique ID for the message
            const messageId = Date.now() + Math.random().toString(36).substr(2, 9);
            messageDiv.setAttribute('data-message-id', messageId);
            messageDiv.setAttribute('data-message-text', text);
            
            const contentWrapper = document.createElement('div');
            contentWrapper.className = 'message-content-wrapper';
            
            const textDiv = document.createElement('div');
            textDiv.className = 'message-text';
            textDiv.textContent = text;
            contentWrapper.appendChild(textDiv);
            
            // Add undo button only to sent messages (user messages)
            if (type === 'sent') {
                const undoBtn = document.createElement('button');
                undoBtn.className = 'message-undo-btn';
                undoBtn.innerHTML = '↶';
                undoBtn.title = 'Undo from here';
                undoBtn.onclick = function() {
                    undoFromMessage(messageId);
                };
                contentWrapper.appendChild(undoBtn);
            }
            
            messageDiv.appendChild(contentWrapper);
            
            const timestamp = document.createElement('div');
            timestamp.className = 'timestamp';
            timestamp.textContent = new Date().toLocaleTimeString();
            messageDiv.appendChild(timestamp);
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            return messageId;
        }

        function addSystemMessage(text, isError = false) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = isError ? 'message error' : 'message system';
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeThinkingIndicator() {
            const messagesDiv = document.getElementById('messages');
            const thinkingMessages = messagesDiv.querySelectorAll('.message.thinking');
            thinkingMessages.forEach(msg => msg.remove());
        }

        function updateThinkingIndicator(text) {
            const messagesDiv = document.getElementById('messages');
            let thinkingMessage = messagesDiv.querySelector('.message.thinking');
            
            if (thinkingMessage) {
                // Update existing thinking indicator
                const textDiv = thinkingMessage.querySelector('div:first-child');
                if (textDiv) {
                    textDiv.textContent = text;
                }
            } else {
                // Create new thinking indicator if none exists
                addMessage(text, 'thinking');
            }
        }

        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
            addSystemMessage('Messages cleared');
        }

        function updateStatus(text, connected) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = text;
            statusDiv.className = connected ? 'status connected' : 'status disconnected';
        }

        function undoFromMessage(messageId) {
            if (!ws || !isConnected) {
                return;
            }
            
            // Find the index of this message in history
            const messageIndex = messageHistory.findIndex(msg => msg.id === messageId);
            if (messageIndex === -1) {
                return;
            }
            
            // Get all messages from this point forward
            const messagesToRemove = messageHistory.slice(messageIndex);
            
            // Send undo command with the index
            ws.send(`/undo-from:${messageIndex}`);
            
            // Show visual feedback immediately
            animateRemovalOfMessages(messagesToRemove);
        }

        function animateRemovalOfMessages(messagesToRemove) {
            const messagesDiv = document.getElementById('messages');
            
            // Add fade-out animation to all messages being removed
            messagesToRemove.forEach(msg => {
                const messageElement = messagesDiv.querySelector(`[data-message-id="${msg.id}"]`);
                if (messageElement) {
                    messageElement.style.animation = 'fadeOut 0.3s ease-out forwards';
                    setTimeout(() => {
                        if (messageElement.parentNode) {
                            messageElement.remove();
                        }
                    }, 300);
                }
            });
            
            // Add system message about undo
            setTimeout(() => {
                addSystemMessage(`↶ Undid ${messagesToRemove.length} message(s)`);
            }, 350);
        }

        function restoreLastUndo() {
            if (!ws || !isConnected) {
                return;
            }
            
            ws.send('/restore');
        }

        function showRestoreButton() {
            const restoreBtn = document.getElementById('restoreBtn');
            if (restoreBtn) {
                restoreBtn.style.display = 'inline-block';
                canRestore = true;
            }
        }

        function hideRestoreButton() {
            const restoreBtn = document.getElementById('restoreBtn');
            if (restoreBtn) {
                restoreBtn.style.display = 'none';
                canRestore = false;
            }
        }

        window.addEventListener('beforeunload', function() {
            if (ws) {
                ws.close();
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            addSystemMessage('Click "Connect" to start');
        });
    </script>
</body>
</html>
